name: Factuel — Pipeline éditorial

on:
  schedule:
    # Matin : 07h00 heure de Paris (UTC+2 en été = 05h00 UTC)
    - cron: "0 5 * * *"
    # Soir : 18h30 heure de Paris (UTC+2 en été = 16h30 UTC)
    - cron: "30 16 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Simuler sans générer (dry-run)"
        required: false
        default: "false"
        type: boolean

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Récupérer le code ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python ────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      # ── 3. Lancer le pipeline ─────────────────────────────────────────────
      - name: Générer les articles
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PYTHONIOENCODING: utf-8
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python scripts/pipeline.py --dry-run
          else
            python scripts/pipeline.py
          fi

      # ── 4. Commit + Push des fichiers générés ────────────────────────────
      - name: Commit les articles générés
        run: |
          git config user.name  "Factuel Bot"
          git config user.email "bot@factuel.fr"

          git add articles/ data/ index.html
          git diff --cached --quiet && echo "Aucun nouvel article." && exit 0

          NB=$(git diff --cached --name-only | grep "^articles/" | wc -l)
          CRENEAU=$([ $(date +%H) -lt 12 ] && echo "matin" || echo "soir")
          git commit -m "✦ ${NB} article(s) — créneau ${CRENEAU} — $(date +'%d/%m/%Y %H:%M')"
          git push
